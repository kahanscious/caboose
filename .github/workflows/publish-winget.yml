name: Publish Winget

# TODO: Enable once WINGET_PR_TOKEN is configured and first manual submission is done
# on:
#   release:
#     types: [published]
on: workflow_dispatch

jobs:
  publish-winget:
    runs-on: windows-latest
    steps:
      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install wingetcreate
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit to Winget
        run: |
          .\wingetcreate.exe update TryCaboose.Caboose `
            --version ${{ steps.version.outputs.VERSION }} `
            --urls "https://github.com/kahanscious/caboose/releases/download/${{ github.ref_name }}/caboose-x86_64-pc-windows-msvc.zip" `
            --submit `
            --token ${{ secrets.WINGET_PR_TOKEN }}
