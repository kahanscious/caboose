name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            tui/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('tui/Cargo.lock') }}

      - name: Build
        working-directory: tui
        run: cargo build

      - name: Test
        working-directory: tui
        run: cargo test

      - name: Clippy
        working-directory: tui
        shell: bash
        run: cargo clippy -- -D warnings 2>/dev/null || cargo clippy
